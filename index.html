<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗡️️ Fusão dos Reinos - Jogo de Estratégia Épico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- STATUS FIREBASE -->
    <div id="firebaseStatus" class="firebase-status">🔌 Conectando...</div>

    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1 class="title">🗡️️ Fusão dos Reinos</h1>
            <p class="subtitle">Estratégia • Traição • Vitória Épica</p>
            <div class="controls">
                <button id="newGameBtn" class="btn btn-primary">🎲 Nova Partida</button>
                <button id="autoPlayBtn" class="btn btn-secondary">🤖 Auto-Jogar</button>
                <button id="shareBtn" class="btn btn-secondary">📱 Compartilhar</button>
            </div>
        </div>

        <!-- GAME AREA -->
        <div class="game-area">
            <div class="phase-display">
                <div id="phaseTitle" class="phase-title">Preparando Batalha...</div>
                <div id="roundInfo" class="round-info">3-6 Jogadores • Estratégia Pura</div>
            </div>

            <div id="kingdomGrid" class="kingdom-grid"></div>

            <div id="actionButtons" class="action-buttons" style="display: none;">
                <button id="betrayBtn1" class="betray-btn" disabled>⚔️ Trair Fogo</button>
                <button id="betrayBtn2" class="betray-btn" disabled>⚔️ Trair Gelo</button>
                <button id="betrayBtn3" class="betray-btn" disabled>⚔️ Trair Relâmpago</button>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">
            <!-- LOG -->
            <div class="panel">
                <h3 class="panel-title">📜 Registro de Batalha</h3>
                <div id="logPanel" class="log-panel">
                    <div class="log-entry">🎮 Sistema iniciado. Prepare-se para a guerra dos reinos!</div>
                </div>
            </div>

            <!-- RANKING FIREBASE -->
            <div class="panel">
                <h3 class="panel-title">🏆 Ranking Global</h3>
                <div id="rankingDisplay" class="ranking-panel">
                    <div style="text-align:center;padding:40px;color:var(--silver);">🔥 Carregando ranking em tempo real...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- VICTORY MODAL -->
    <div id="victoryModal" class="victory-modal">
        <div class="victory-content">
            <div class="victory-icon">👑</div>
            <h2 class="victory-title" id="victoryKingdom"></h2>
            <div id="victoryStats" class="victory-stats"></div>
            <div style="margin-top:30px;">
                <button id="newGameModalBtn" class="btn btn-primary" style="font-size:1.2rem;padding:15px 40px;">🎲 Nova Partida</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
